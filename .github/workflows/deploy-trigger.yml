name: Deploy to Trigger.dev

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Trigger.dev
        run: npx trigger deploy
        env:
          TRIGGER_SECRET_KEY: ${{ secrets.TRIGGER_PROD_SECRET_KEY }}
